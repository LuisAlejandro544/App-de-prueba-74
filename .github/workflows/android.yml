name: Android Release CI/CD

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  # Allows manual triggers from the Actions tab in GitHub
  workflow_dispatch:

jobs:
  build-and-sign:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Configure advanced, robust caching for Gradle builds
      - name: Setup Gradle Cache & Build System
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-read-only: false

      # Decode the debug keystore if present to ensure the build compiles successfully
      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          fi

      # Build the Release APK (Gradle will gracefully fallback to debug signature if release keystore is not provided)
      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --build-cache

      # Upload the finalized, signed and aligned APK as an artifact
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-signed
          path: app/build/outputs/apk/**/*.apk
