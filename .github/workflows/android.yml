name: Android Release CI/CD

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  # Allows manual triggers from the Actions tab in GitHub
  workflow_dispatch:

jobs:
  build-and-sign:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Configure advanced, robust caching for Gradle builds
      - name: Setup Gradle Cache & Build System
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          cache-read-only: false
          validate-wrappers: false

      # Decode the production/upload keystore if the secret is provided
      - name: Decode Production Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            # Clean all carriage returns, newlines, and whitespaces, then decode
            echo "$KEYSTORE_BASE64" | tr -d '\r\n[:space:]' | base64 --decode > ${{ github.workspace }}/my-upload-key.jks
            if [ -s "${{ github.workspace }}/my-upload-key.jks" ]; then
              echo "Keystore decoded successfully. Size: $(wc -c < ${{ github.workspace }}/my-upload-key.jks) bytes"
            else
              echo "Error: Keystore file is empty after decoding"
            fi
          else
            echo "KEYSTORE_BASE64 secret is not set or empty."
          fi

      # Build the Release APK
      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --build-cache
        env:
          KEYSTORE_PATH: "${{ github.workspace }}/my-upload-key.jks"
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Upload the finalized, signed and aligned APK as an artifact
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-signed
          path: app/build/outputs/apk/**/*.apk
