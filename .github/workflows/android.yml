name: Compilar y Firmar APK (Generador de Keystores) 🚀

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Permite compilar manualmente desde la pestaña Actions en GitHub

jobs:
  build:
    name: Compilar APK de Lanzamiento
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código (Checkout)
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Gradle y Caché
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false # Permite escribir y leer de la caché para máxima velocidad
          validate-wrappers: false # Evita errores de validación de wrapper personalizados

      - name: Decodificar Keystore de Firma
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Compilar APK de Lanzamiento (Release)
        run: gradle assembleRelease -Pkotlin.compiler.execution.strategy=daemon
        env:
          KEYSTORE_PATH: "app/release.jks"
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Renombrar APK a KeystoreGenerator
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/KeystoreGenerator.apk

      - name: Subir APK Compilado como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: KeystoreGenerator-Release-APK
          path: app/build/outputs/apk/release/KeystoreGenerator.apk
          if-no-files-found: error
          retention-days: 7
